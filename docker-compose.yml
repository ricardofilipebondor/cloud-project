services:
  postgres:
    image: postgres:16
    container_name: streamsync-postgres
    environment:
      POSTGRES_DB: streamsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres_data:
